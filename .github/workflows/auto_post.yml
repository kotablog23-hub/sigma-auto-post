name: X Auto Post

# トリガーはcron-job.org（外部）からworkflow_dispatchで呼び出す
# JST時刻通りに確実に実行するため、GitHub Actions内蔵cronは使用しない

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run（実際には投稿しない）'
        required: false
        default: 'false'
        type: boolean
  schedule:
    # 夕方5スロット（JST = UTC+9）
    - cron: '7 9 * * *'    # 18:07 JST
    - cron: '43 9 * * *'   # 18:43 JST
    - cron: '21 10 * * *'  # 19:21 JST
    - cron: '17 11 * * *'  # 20:17 JST
    - cron: '38 12 * * *'  # 21:38 JST

concurrency:
  group: auto-post
  cancel-in-progress: false  # 同時実行しない（キューに積む）

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 状態ファイルをpushするために必要

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run auto_post.py
        env:
          X_API_KEY:             ${{ secrets.X_API_KEY }}
          X_API_SECRET:          ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:        ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          THREADS_ACCESS_TOKEN:  ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python3 scripts/auto_post.py --dry-run
          else
            python3 scripts/auto_post.py
          fi

      - name: Commit state file
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add x_posts/.smart_post_state.json
          git diff --staged --quiet || git commit -m "chore: update post state [skip ci]"
          git push
